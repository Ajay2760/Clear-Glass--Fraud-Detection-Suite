kind = "web"
previewPath = "/"
title = "ClearGlass – Fraud Detection Platform"
version = "1.0.0"
id = "artifacts/clearglass"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21593

[services.development]
run = "pnpm --filter @workspace/clearglass run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clearglass", "run", "build" ]
publicDir = "artifacts/clearglass/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21593"
BASE_PATH = "/"
